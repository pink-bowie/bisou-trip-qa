<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+SC:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bisou Travel - Busca de Passagens</title>

    <!-- Link para o arquivo CSS que vamos criar a seguir -->
    <link rel="stylesheet" href="bugs.css">
</head>
<body>

    <div class="barra-topo">
    <a href="index.html" class="btn-bug-link">Retornar para a Versão Correta</a>
</div>

<header class="hero">
    <div class="hero-conteudo">
        <h1>Bisou Travel</h1>
        <p>Sua próxima aventura começa com um clique.</p>
    </div>
</header>

<section class="barra-titulo-busca">
    <h2>Preencha o formulário para buscar as melhores ofertas!</h2>
</section>

    <!-- FORMULÁRIO DE BUSCA -->
    <main class="container-busca">
        <form id="formBusca" class="form-viagem" novalidate>
            
            <!-- Campo de Origem -->
            <div class="campo-grupo">
                <label for="origem">Origem:</label>
                <select id="origem" required>
                    <option value="">Selecione a origem</option>
                    <option value="Bouvale">Bouvale</option>
                    <option value="Valcendre">Valcendre</option>
                    <option value="Eyrovine">Eyrovine</option>
                </select>
            </div>

            <!-- Campo de Destino -->
            <div class="campo-grupo destino">
                <label for="destino">Destino:</label>
                <select id="destino" required>
                    <option value="">Selecione o destino</option>
                    <option value="Bouvale">Bouvale</option>
                    <option value="Valcendre">Valcendre</option>
                    <option value="Eyrovine">Eyrovine</option>
                </select>
            </div>
           
            <div class="campo-grupo total-width">
                <label for="passageiros">Número de Passageiros:</label>
                <input type="number" id="passageiros" name="passageiros" value="1">
            </div>
          
            <div class="campo-grupo">
                <label for="dataIda">Data de Ida:</label>
                <input type="date" id="dataIda" required>
            </div>

            <div class="campo-grupo">
                <label for="dataVolta">Data de Volta:</label>
                <input type="date" id="dataVolta" required>
            </div>

            <button type="submit" id="btnBuscar" class="btn-buscar">Buscar Passagens</button>
            <div id="mensagem" class="mensagem"></div>
        </form>
        
    </main>

    <!-- 4. FOOTER -->
    <footer class="footer">
        <p>&copy; 2026 Bisou Travel. Desenvolvido por Jesse Rother. </p>
        <div class="links-sociais">
            <a href="https://www.linkedin.com/in/jesse-rother/" target="_blank" rel="noopener">LinkedIn</a>
            <a href="https://github.com/pink-bowie" target="_blank" rel="noopener">GitHub</a>
        </div>
    </footer>

    <script src="script_bugs.js"></script>
</body>
</html>
